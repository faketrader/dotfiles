  #     # ORACLE_SID: ORCL
  #     # 21 必须为 XE
  #     # ORACLE_SID: XE
  #     # 23ai 必须为 FREE
  #     ORACLE_SID: FREE
  #     ORACLE_PWD: oracle
  #   ports:
  #     - "1521:1521"
