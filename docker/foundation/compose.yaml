name: foundation

networks:
  proxy-bridge:
    name: proxy-bridge
    driver: bridge

services:
  mysql:
    image: mysql:${MYSQL_VERSION}
    restart: always
    networks:
      - proxy-bridge
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ${MYSQL_HOME}/${MYSQL_VERSION}/data:/var/lib/mysql
      - ${MYSQL_HOME}/${MYSQL_VERSION}/etc/my.cnf:/etc/my.cnf

  redis:
    image: redis:${REDIS_VERSION}
    restart: always
    networks:
      - proxy-bridge
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${REDIS_HOME}/${REDIS_VERSION}/data:/data
    # command: redis-server --requirepass root

  postgres:
    image: postgres:${POSTGRES_VERSION}
    restart: always
    # set shared memory limit when using docker-compose
    # shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    networks:
      - proxy-bridge
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_HOME}/${POSTGRES_VERSION}/postgresql.conf:/etc/postgresql/postgresql.conf
      # PG 18+ binds to /var/lib/postgresql
      - ${POSTGRES_HOME}/${POSTGRES_VERSION}/data:/var/lib/postgresql
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb

  # oracle:
  #   # image: oracle/database:19.3.0-ee
  #   image: container-registry.oracle.com/database/free:23.5.0.0-lite
  #   container_name: oracle-db
  #   # restart: always
  #   environment:
  #     # ORACLE_PDB: FREEPDB1
