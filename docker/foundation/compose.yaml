  #   volumes:
  #     - ${ORACLE_HOME}/23ai/opt/oracle/oradata:/opt/oracle/oradata

  # zookeeper:
  #   image: zookeeper:${ZOOKEEPER_VERSION}
  #   container_name: zookeeper
  #   ports:
  #     - "2181:2181"

  kafka-broker:
    image: apache/kafka:${KAFKA_VERSION}
    profiles: [disabled]
    networks:
      - proxy-bridge
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - ${KAFKA_HOME}/etc/kafka/secrets:/etc/kafka/secrets
      - ${KAFKA_HOME}/mnt/shared/config:/mnt/shared/config
      - ${KAFKA_HOME}/var/lib/kafka/data:/var/lib/kafka/data

  # kafka-ui:
  #   container_name: kafka-ui
  #   image: provectuslabs/kafka-ui:latest
  #   ports:
  #     - "127.0.0.1:19092:8080
  #   networks:
  #     - infra-bridge
  #   # depends_on:
  #   #   - kafka-broker
  #   environment:
  #     DYNAMIC_CONFIG_ENABLED: 'true'
  #   extra_hosts:
  #     - "dev16=10.100.0.16"
  #     - "dev17=10.100.0.17"
  #     - "dev18=10.100.0.18"
  #   # volumes:
  #   #   - ${KAFKA_HOME}/kafkaui/config.yml:/etc/kafkaui/dynamic_config.yaml

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION}
    # profiles: [disabled]
    networks:
      - proxy-bridge
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}


  # minio:
  #   image: minio/minio:${MINIO_VERSION}
  #   container_name: minio
  #   ports:
  #     - "127.0.0.1:9000:9000"
  #     - "127.0.0.1:9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  #     MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  #   volumes:
  #     - ${MINIO_HOME}/data:/data
  #     # - ${MINIO_HOME}/config:/root/.minio
  #   command: server /data --console-address ":9001"


  rustfs:
    image: rustfs/rustfs:${RUSTFS_VERSION:-latest}
    profiles: [disabled]
    networks:
      - proxy-bridge
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    volumes:
      - ${RUSTFS_HOME}/data:/data
      - ${RUSTFS_HOME}/logs:/app/logs


  sftpgo:
    image: drakkan/sftpgo:latest
    profiles: [disabled]
    networks:
      - proxy-bridge
    ports:
      # Web UI
      - 127.0.0.1:2020:8080
      # SFTP/SSH
      - 127.0.0.1:2022:2022
      # extra
      # FTP
      - 127.0.0.1:2021:21
      - 127.0.0.1:50000-50010:50000-50010
      # WebDAV
      - 127.0.0.1:2080:80
    environment:
      SFTPGO_FTPD__BINDINGS__0__PORT: 21
      SFTPGO_FTPD__BINDINGS__0__FORCE_PASSIVE_IP: 127.0.0.1
      SFTPGO_FTPD__PASSIVE_PORT_RANGE__START: 50000
      SFTPGO_FTPD__PASSIVE_PORT_RANGE__END: 50010
      SFTPGO_WEBDAVD__BINDINGS__0__PORT: 80
    volumes:
      # - ${SFTPGO_HOME}:/srv/sftpgo
      - ${SFTPGO_HOME}/data:/srv/sftpgo/data
      - ${SFTPGO_HOME}/backups:/srv/sftpgo/backups
      - ${SFTPGO_HOME}/home:/var/lib/sftpgo

  traefik:
    image: traefik:${TRAEFIK_VERSION}
    restart: always
    # profiles: [disabled]
    networks:
      - proxy-bridge
    ports:
      - "127.0.0.1:80:80"
      # - "127.0.0.1:8080:8080"
    volumes:
      - ./traefik/etc/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/etc/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock

